<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Out &amp; About | Esha Singaraju</title>
    <meta
      name="description"
      content="Out & About page for Esha Singaraju featuring a clothesline gallery of public moments."
    />
    <link rel="icon" type="image/png" href="assets/finalfavicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="theme-about-town clothesline-page">
    <div class="about-sky-scene" aria-hidden="true">
      <div class="scene-sun">
        <span class="scene-sun-core"></span>
        <span class="scene-sun-ray ray-east"></span>
        <span class="scene-sun-ray ray-east-soft"></span>
        <span class="scene-sun-ray ray-southeast"></span>
        <span class="scene-sun-ray ray-south"></span>
        <span class="scene-sun-ray ray-south-soft"></span>
      </div>
      <img
        class="scene-cloud scene-cloud-one"
        src="assets/cloud1.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-two"
        src="assets/cloud2.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-three"
        src="assets/cloud3.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-four"
        src="assets/cloud4.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-five"
        src="assets/cloud1.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-six"
        src="assets/cloud2.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-seven"
        src="assets/cloud3.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-eight"
        src="assets/cloud4.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-nine"
        src="assets/cloud2.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-ten"
        src="assets/cloud1.png"
        alt=""
      />
      <img
        class="scene-cloud scene-cloud-eleven"
        src="assets/cloud3.png"
        alt=""
      />
      <div class="scene-birds">
        <img class="scene-bird scene-bird-one" src="assets/bird1.png" alt="" />
        <img
          class="scene-bird scene-bird-two"
          src="assets/bird2.png"
          alt=""
        />
        <img
          class="scene-bird scene-bird-three"
          src="assets/bird3.png"
          alt=""
        />
      </div>
      <div class="scene-meadow">
        <span class="meadow-hill meadow-hill-back"></span>
        <span class="meadow-hill meadow-hill-front"></span>
        <img
          class="meadow-flowers meadow-flowers-left"
          src="assets/left flowers.png"
          alt=""
        />
        <img
          class="meadow-flowers meadow-flowers-right"
          src="assets/left flowers.png"
          alt=""
        />
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
